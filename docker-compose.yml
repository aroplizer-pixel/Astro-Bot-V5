version: '3.8'

services:
  knightbot:
    build: .
    container_name: knightbot-md
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # الحفاظ على بيانات الجلسة والـ database بين إعادة التشغيل
      - ./data:/app/data
      - ./session:/app/session
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "node", "-e", "require('fs').existsSync('./data/database.db') ? process.exit(0) : process.exit(1)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
